<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,follow" />
    <meta
      name="description"
      content="This No Gatekeeping page does not exist. Browse the tool directory or return home."
    />
    <title>Page Not Found - No Gatekeeping</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Syne, Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f7f4ef;
        color: #202c39;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(720px, 100%);
        border: 2px solid #111111;
        background: #ffffff;
        padding: clamp(28px, 6vw, 56px);
        box-shadow: 8px 8px 0 #111111;
      }

      .eyebrow {
        margin: 0 0 16px;
        color: #1982c4;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        max-width: 9ch;
        font-size: clamp(52px, 12vw, 96px);
        font-weight: 900;
        letter-spacing: 0;
        line-height: 0.86;
        text-transform: uppercase;
      }

      p {
        margin: 20px 0 0;
        max-width: 560px;
        color: #52616f;
        font-size: 16px;
        font-weight: 650;
        line-height: 1.65;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      a {
        border: 2px solid #111111;
        color: #111111;
        display: inline-flex;
        font-size: 13px;
        font-weight: 900;
        letter-spacing: 0.1em;
        padding: 12px 16px;
        text-decoration: none;
        text-transform: uppercase;
      }

      a:first-child {
        background: #ffca3a;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">404 / No Gatekeeping</p>
      <h1>Page Not Found</h1>
      <p>
        This route is not a published No Gatekeeping page. Head back home or
        browse the full tool directory to find the utility you need.
      </p>
      <nav aria-label="Useful links">
        <a href="/">Home</a>
        <a href="/tools">All Tools</a>
        <a href="/blog">Blog</a>
      </nav>
    </main>
  </body>
</html>
